<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hilo — Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg:#0d0a0e;
      --gold:#c9a84c;
      --gold-lt:#e8c97a;
      --cream:#f5ede0;
      --rope-col:#c4a35a;
      --rope-shadow:rgba(120,80,20,0.35);
    }

    html{overflow-x:hidden}
    body{
      background:var(--bg);
      overflow-x:hidden;
      font-family:'Playfair Display',Georgia,serif;
      user-select:none;
    }

    #bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block}
    #particle-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}

    .grain-overlay{
      position:fixed;inset:0;width:100%;height:100%;
      pointer-events:none;opacity:.05;mix-blend-mode:overlay;z-index:50;
    }

    .vignette{
      position:fixed;inset:0;
      background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.6) 100%);
      pointer-events:none;z-index:6;
    }

    #rope-scene{
      position:relative;width:100%;
      will-change:transform;z-index:10;
    }

    #rope-svg{
      position:absolute;top:0;left:0;width:100%;
      pointer-events:none;z-index:5;
    }
    #rope-shadow-path{
      fill:none;stroke:var(--rope-shadow);stroke-width:9;
      stroke-linecap:round;stroke-linejoin:round;
    }
    #rope-path{
      fill:none;stroke:var(--rope-col);stroke-width:5;
      stroke-linecap:round;stroke-linejoin:round;
      filter:drop-shadow(0 0 6px rgba(201,168,76,0.25));
    }
    .pin-dot{
      fill:var(--gold);opacity:0;
      transition:opacity .5s ease;
      filter:drop-shadow(0 0 6px rgba(201,168,76,0.6));
    }
    .pin-dot.visible{opacity:1}

    /* ── Polaroid ── */
    .polaroid{
      position:absolute;
      transform-origin:top center;
      opacity:0;cursor:default;z-index:10;
    }
    .polaroid.entering{
      animation:pinEntry .9s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .polaroid.entered{
      opacity:1;
    }
    .polaroid.entered .polaroid-frame{
      animation:gentleSway var(--sw-dur,5s) ease-in-out var(--sw-delay,0s) infinite;
    }

    @keyframes pinEntry{
      from{opacity:0;transform:scale(.5) translateY(-50px) rotate(calc(var(--rot) + 20deg));}
      to{opacity:1;transform:scale(1) translateY(0) rotate(var(--rot));}
    }
    @keyframes gentleSway{
      0%,100%{transform:rotate(calc(var(--rot) - 2.5deg))}
      50%{transform:rotate(calc(var(--rot) + 2.5deg))}
    }

    .pin-head{
      position:absolute;top:-6px;left:calc(50% - var(--pin-offset,0px));transform:translateX(-50%);
      width:14px;height:14px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#e8c97a,#9a6f20);
      box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 12px rgba(201,168,76,0.3);
      z-index:2;
    }
    .hang-thread{
      position:absolute;top:8px;left:calc(50% - var(--pin-offset,0px));transform:translateX(-50%);
      width:1.5px;height:20px;
      background:linear-gradient(to bottom,rgba(196,163,90,0.7),rgba(196,163,90,0.3));
      z-index:1;
    }

    .polaroid-frame{
      position:relative;
      background:#f5f0e8;
      padding:8px 8px 28px;
      border-radius:3px;
      box-shadow:
        0 10px 40px rgba(0,0,0,.55),
        0 2px 8px rgba(0,0,0,.3),
        0 0 0 1px rgba(201,168,76,0.08);
      margin-top:28px;
      width:clamp(145px,42vw,220px);
    }
    .polaroid-media{
      display:block;width:100%;aspect-ratio:3/4;
      object-fit:contain;border-radius:1px;
      background:#f5f0e8;
    }
    video.polaroid-media{cursor:pointer}

    .polaroid-caption{
      height:18px;display:flex;align-items:center;justify-content:center;
      font-size:9px;font-style:italic;font-weight:300;
      color:rgba(60,40,20,.5);letter-spacing:.06em;
    }

    @media (max-width: 640px) {
      .polaroid-frame { width: clamp(130px, 38vw, 180px); }
    }

    /* ── Knot ── */
    #knot-wrap{
      position:absolute;left:50%;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center;gap:14px;
      opacity:0;z-index:15;
    }
    #knot-wrap.visible{opacity:1}

    #knot-label{
      font-size:clamp(13px,1.4vw,16px);font-style:italic;font-weight:300;
      letter-spacing:.12em;color:rgba(245,237,224,.55);opacity:0;
      transition:opacity 1s ease;
    }
    #knot-label.visible{opacity:1}

    #audio-btn{
      display:flex;align-items:center;gap:6px;position:fixed;bottom:3vh;right:3vw;z-index:40;
      background:rgba(20,12,28,.6);border:1px solid rgba(201,168,76,.25);
      border-radius:20px;padding:7px 16px;color:rgba(245,237,224,.55);
      font-family:inherit;font-size:13px;font-style:italic;cursor:pointer;
      backdrop-filter:blur(8px);transition:opacity .3s ease,background .3s ease;
      opacity:.55;
    }
    #audio-btn:hover{opacity:1;background:rgba(20,12,28,.8);border-color:rgba(201,168,76,.5)}

    #prompt{
      position:fixed;bottom:6vh;left:50%;transform:translateX(-50%);z-index:30;
      font-size:clamp(11px,1.2vw,15px);font-style:italic;font-weight:300;
      letter-spacing:.13em;white-space:nowrap;color:rgba(245,237,224,.45);
      opacity:0;pointer-events:none;transition:opacity .9s ease;
    }
    #prompt.visible{opacity:1;animation:promptBreathe 3s ease-in-out infinite}
    @keyframes promptBreathe{0%,100%{opacity:.28}50%{opacity:.62}}

    #fade-overlay{position:fixed;inset:0;background:#000;opacity:1;z-index:100;transition:opacity .6s ease}

    @media(prefers-reduced-motion:reduce){
      .polaroid.entering,.polaroid.entered .polaroid-frame{animation:none!important;opacity:1}
      #knot-wrap.visible,#knot-wrap.tighten,#knot-wrap.settled{animation:none!important;opacity:1;transform:translateX(-50%)}
      .knot-strand,.knot-tail{transition:none!important;stroke-dashoffset:0!important}
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<svg class="grain-overlay" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <filter id="gf" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence id="gt" type="fractalNoise" baseFrequency=".68" numOctaves="4" seed="9" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#gf)"/>
</svg>

<div class="vignette"></div>

<div id="rope-scene">
  <svg id="rope-svg" xmlns="http://www.w3.org/2000/svg">
    <path id="rope-shadow-path"/>
    <path id="rope-path"/>
    <g id="pin-dots"></g>
  </svg>
  <!-- polaroids injected by JS -->
  <div id="knot-wrap">
    <p id="knot-label">still going</p>
  </div>
</div>

<audio id="theme-audio" loop preload="auto">
  <source src="./assets/theme.mp3" type="audio/mpeg">
</audio>
<button id="audio-btn">♪ play</button>

<p id="prompt">click anywhere to continue</p>
<div id="fade-overlay"></div>

<script src="./trail.js"></script>
<script>
/* ═══════════════════════════════════════════
   MEDIA ITEMS — edit filenames here
   ═══════════════════════════════════════════ */
const MEDIA_ITEMS = [
    {type:'photo', src:'./assets/photo-001.jpg'},    {type:'photo', src:'./assets/photo-002.jpg'},    {type:'photo', src:'./assets/photo-003.jpg'},    {type:'photo', src:'./assets/photo-004.jpg'},    {type:'photo', src:'./assets/photo-005.jpg'},    {type:'photo', src:'./assets/photo-006.jpg'},    {type:'photo', src:'./assets/photo-007.jpg'},    {type:'video', src:'./assets/video-01.mp4'},    {type:'photo', src:'./assets/photo-008.jpg'},    {type:'video', src:'./assets/video-02.mp4'},    {type:'video', src:'./assets/video-03.mp4'},    {type:'photo', src:'./assets/photo-009.jpg'},    {type:'video', src:'./assets/video-04.mp4'},    {type:'photo', src:'./assets/photo-010.jpg'},    {type:'photo', src:'./assets/photo-011.jpg'},    {type:'photo', src:'./assets/photo-012.jpg'},    {type:'photo', src:'./assets/photo-013.jpg'},    {type:'photo', src:'./assets/photo-014.jpg'},    {type:'photo', src:'./assets/photo-015.jpg'},    {type:'video', src:'./assets/video-05.mp4'},    {type:'photo', src:'./assets/photo-016.jpg'},    {type:'photo', src:'./assets/photo-017.jpg'},    {type:'photo', src:'./assets/photo-018.jpg'},    {type:'photo', src:'./assets/photo-019.jpg'},    {type:'photo', src:'./assets/photo-020.jpg'},    {type:'photo', src:'./assets/photo-021.jpg'},    {type:'photo', src:'./assets/photo-022.jpg'},    {type:'photo', src:'./assets/photo-023.jpg'},    {type:'photo', src:'./assets/photo-024.jpg'},    {type:'photo', src:'./assets/photo-025.jpg'},    {type:'photo', src:'./assets/photo-026.jpg'},    {type:'photo', src:'./assets/photo-027.jpg'},    {type:'photo', src:'./assets/photo-028.jpg'},    {type:'photo', src:'./assets/photo-029.jpg'},    {type:'photo', src:'./assets/photo-030.jpg'},    {type:'photo', src:'./assets/photo-031.jpg'},    {type:'photo', src:'./assets/photo-032.jpg'},    {type:'photo', src:'./assets/photo-033.jpg'},    {type:'photo', src:'./assets/photo-034.jpg'},    {type:'photo', src:'./assets/photo-035.jpg'},    {type:'photo', src:'./assets/photo-036.jpg'},    {type:'photo', src:'./assets/photo-037.jpg'},    {type:'photo', src:'./assets/photo-038.jpg'},    {type:'photo', src:'./assets/photo-039.jpg'},    {type:'photo', src:'./assets/photo-040.jpg'},    {type:'photo', src:'./assets/photo-041.jpg'},    {type:'photo', src:'./assets/photo-042.jpg'},    {type:'photo', src:'./assets/photo-043.jpg'},    {type:'photo', src:'./assets/photo-044.jpg'},    {type:'photo', src:'./assets/photo-045.jpg'},    {type:'photo', src:'./assets/photo-046.jpg'},    {type:'photo', src:'./assets/photo-047.jpg'},    {type:'photo', src:'./assets/photo-048.jpg'},    {type:'photo', src:'./assets/photo-049.jpg'},    {type:'photo', src:'./assets/photo-050.jpg'},    {type:'photo', src:'./assets/photo-051.jpg'},    {type:'photo', src:'./assets/photo-052.jpg'},    {type:'video', src:'./assets/video-06.mp4'},    {type:'video', src:'./assets/video-07.mp4'},    {type:'photo', src:'./assets/photo-053.jpg'},    {type:'photo', src:'./assets/photo-054.jpg'},    {type:'photo', src:'./assets/photo-055.jpg'},    {type:'photo', src:'./assets/photo-056.jpg'},    {type:'photo', src:'./assets/photo-057.jpg'},    {type:'photo', src:'./assets/photo-058.jpg'},    {type:'photo', src:'./assets/photo-059.jpg'},    {type:'photo', src:'./assets/photo-060.jpg'},    {type:'photo', src:'./assets/photo-061.jpg'},    {type:'photo', src:'./assets/photo-062.jpg'},    {type:'photo', src:'./assets/photo-063.jpg'},    {type:'photo', src:'./assets/photo-064.jpg'},    {type:'photo', src:'./assets/photo-065.jpg'},    {type:'video', src:'./assets/video-08.mp4'},    {type:'video', src:'./assets/video-09.mp4'},    {type:'photo', src:'./assets/photo-066.jpg'},    {type:'video', src:'./assets/video-10.mp4'},    {type:'photo', src:'./assets/photo-067.jpg'},    {type:'video', src:'./assets/video-11.mp4'},    {type:'photo', src:'./assets/photo-068.jpg'},    {type:'video', src:'./assets/video-12.mp4'},    {type:'video', src:'./assets/video-13.mp4'},    {type:'video', src:'./assets/video-14.mp4'},
];

/* ── Utilities ── */
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
function seeded(n){const x=Math.sin(n*127.1+311.7)*43758.5453;return x-Math.floor(x);}

/* ── Background ── */
(function(){
  const cv=document.getElementById('bg-canvas'),cx=cv.getContext('2d');
  function resize(){cv.width=innerWidth;cv.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  function draw(){
    const w=cv.width,h=cv.height,t=Date.now()*.00038;
    cx.fillStyle='#0d0a0e';cx.fillRect(0,0,w,h);
    const p1=cx.createRadialGradient(w*(.15+.12*Math.sin(t*.85)),h*(.18+.1*Math.cos(t*.65)),0,w*.15,h*.18,w*.7);
    p1.addColorStop(0,'rgba(74,45,92,.45)');p1.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=p1;cx.fillRect(0,0,w,h);
    const p2=cx.createRadialGradient(w*(.6+.1*Math.cos(t*.7)),h*(.45+.1*Math.sin(t*.9)),0,w*.6,h*.45,w*.55);
    p2.addColorStop(0,'rgba(201,168,76,.1)');p2.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=p2;cx.fillRect(0,0,w,h);
    const p3=cx.createRadialGradient(w*(.45+.08*Math.sin(t*1.1)),h*(.8+.06*Math.cos(t*.75)),0,w*.45,h*.8,w*.62);
    p3.addColorStop(0,'rgba(46,31,58,.55)');p3.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=p3;cx.fillRect(0,0,w,h);
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Particles ── */
(function(){
  const cv=document.getElementById('particle-canvas'),cx=cv.getContext('2d');
  const particles=[];const COUNT=40;
  function resize(){cv.width=innerWidth;cv.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<COUNT;i++){
    particles.push({
      x:Math.random()*innerWidth,y:Math.random()*innerHeight*3,
      r:Math.random()*1.4+0.3,
      dx:(Math.random()-0.5)*0.08,dy:Math.random()*0.15+0.02,
      alpha:Math.random()*0.25+0.04,
      pulse:Math.random()*Math.PI*2,pulseSpeed:Math.random()*0.005+0.002
    });
  }
  function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    for(const p of particles){
      p.x+=p.dx;p.y+=p.dy;p.pulse+=p.pulseSpeed;
      if(p.y>innerHeight*1.1){p.y=-10;p.x=Math.random()*innerWidth;}
      if(p.x<-10)p.x=cv.width+10;if(p.x>cv.width+10)p.x=-10;
      const a=p.alpha*(0.6+0.4*Math.sin(p.pulse));
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle=`rgba(201,168,76,${a.toFixed(3)})`;cx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Grain ── */
(function(){const t=document.getElementById('gt');let s=9;
  setInterval(()=>{s=(s%199)+1;t.setAttribute('seed',s);},250);
})();

/* ═══════════════════════════════════════════
   ROPE TIMELINE — rebuilt
   ═══════════════════════════════════════════ */
let totalLen=0,ropePathEl,ropeShadowEl,pinGroup;
let knotAnimDone=false;
let audioEl,audioDucked=false;

window.addEventListener('DOMContentLoaded',buildScene);
window.addEventListener('resize',debounce(()=>location.reload(),400));

function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

function buildScene(){
  const W=window.innerWidth;
  const VH=window.innerHeight;
  const cx=W/2;
  const N=MEDIA_ITEMS.length;
  const SPACING=390;
  const isMobile=W<640;
  const AMP=isMobile?clamp(W*.18,55,110):clamp(W*.42,140,320);
  const ROPE_TOP=10;

  /* ── Page dimensions ── */
  const PAGE_H=ROPE_TOP+N*SPACING+700+VH;
  document.body.style.minHeight=PAGE_H+'px';
  const scene=document.getElementById('rope-scene');
  scene.style.minHeight=PAGE_H+'px';
  const ropeSvg=document.getElementById('rope-svg');
  ropeSvg.setAttribute('height',PAGE_H);
  ropeSvg.setAttribute('viewBox',`0 0 ${W} ${PAGE_H}`);
  ropeSvg.setAttribute('width',W);

  /* ── Attachment points ── */
  const pts=[];
  for(let i=0;i<N;i++){
    const side=i%2===0?1:-1;
    const xVar=(seeded(i*3)-.5)*36;
    const yVar=(seeded(i*3+1)-.5)*18;
    const rot=side*(isMobile?2+seeded(i*3+2)*4:4+seeded(i*3+2)*7);
    pts.push({x:cx+side*(AMP+xVar),y:ROPE_TOP+(i+1)*SPACING+yVar,rot,side});
  }
  const knotY=pts[N-1].y+290;

  /* ── Rope SVG path ── */
  ropePathEl=document.getElementById('rope-path');
  ropeShadowEl=document.getElementById('rope-shadow-path');
  pinGroup=document.getElementById('pin-dots');

  const pathD=buildRopePath(cx,ROPE_TOP,pts,knotY);
  ropePathEl.setAttribute('d',pathD);
  ropeShadowEl.setAttribute('d',pathD);
  ropeShadowEl.setAttribute('transform','translate(2,3)');

  totalLen=ropePathEl.getTotalLength();
  ropePathEl.style.strokeDasharray=totalLen;
  ropePathEl.style.strokeDashoffset=totalLen;
  ropeShadowEl.style.strokeDasharray=totalLen;
  ropeShadowEl.style.strokeDashoffset=totalLen;

  /* ── Pin dots ── */
  // Top anchor dot
  const anchorDot=document.createElementNS('http://www.w3.org/2000/svg','circle');
  anchorDot.setAttribute('cx',cx);anchorDot.setAttribute('cy',ROPE_TOP);anchorDot.setAttribute('r','6');
  anchorDot.classList.add('pin-dot','visible');
  pinGroup.appendChild(anchorDot);

  pts.forEach((pt,i)=>{
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);c.setAttribute('r','5');
    c.classList.add('pin-dot');c.dataset.idx=i;
    pinGroup.appendChild(c);
  });

  /* ── Polaroids ── */
  const frag=document.createDocumentFragment();
  pts.forEach((pt,i)=>{
    const item=MEDIA_ITEMS[i];
    const pw=clamp(W*.22,180,280);

    const wrap=document.createElement('div');
    wrap.className='polaroid';wrap.dataset.idx=i;
    const mobileOffset=isMobile?pt.side*Math.min(pw*0.42,W*0.28):pt.side*16;
    wrap.style.cssText=[
      `left:${pt.x-pw/2+mobileOffset}px`,
      `top:${pt.y-28}px`,
      `--rot:${pt.rot}deg`,
      `--sw-dur:${4+seeded(i*7)*3.2|0}s`,
      `--sw-delay:-${(seeded(i*11)*4).toFixed(1)}s`,
      `--pin-offset:${mobileOffset}px`,
    ].join(';');

    wrap.innerHTML=`
      <div class="pin-head"></div>
      <div class="hang-thread"></div>
      <div class="polaroid-frame" style="width:${pw}px">
        ${item.type==='video'
          ?`<video class="polaroid-media" src="${item.src}" muted playsinline preload="none" loop></video>`
          :`<img class="polaroid-media" src="${item.src}" loading="lazy" alt=""/>`
        }
        <div class="polaroid-caption"></div>
      </div>`;

    frag.appendChild(wrap);
  });
  scene.appendChild(frag);

  /* ── End label position ── */
  const knotWrap=document.getElementById('knot-wrap');
  knotWrap.style.top=knotY+'px';

  /* ── Scroll animation ── */
  const MAX_SCROLL=PAGE_H-VH;
  let curOffset=totalLen;
  let lastSY=window.scrollY;

  function tick(){
    const sy=window.scrollY;
    const progress=clamp((sy+VH*0.82)/MAX_SCROLL,0,1);
    const targetOffset=totalLen*(1-progress);
    curOffset=lerp(curOffset,targetOffset,0.12);

    ropePathEl.style.strokeDashoffset=curOffset;
    ropeShadowEl.style.strokeDashoffset=curOffset;

    if(progress>0.98&&!knotAnimDone)triggerKnot();

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  /* ── IntersectionObserver — polaroids ── */
  const pinObserver=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(!entry.isIntersecting)return;
      const el=entry.target;
      const idx=+el.dataset.idx;

      const dot=pinGroup.querySelector(`[data-idx="${idx}"]`);
      if(dot)dot.classList.add('visible');

      el.classList.add('entering');
      el.addEventListener('animationend',e=>{
        if(e.animationName!=='pinEntry')return;
        el.classList.remove('entering');
        el.classList.add('entered');
      },{once:true});
      setTimeout(()=>{
        if(!el.classList.contains('entered')){
          el.classList.remove('entering');el.classList.add('entered');
        }
      },1000);

      pinObserver.unobserve(el);
    });
  },{rootMargin:'0px 0px 150px 0px',threshold:0.05});

  document.querySelectorAll('.polaroid').forEach(p=>pinObserver.observe(p));

  /* ── Videos ── */
  const videoObserver=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const vid=entry.target;
      if(entry.isIntersecting){
        vid.muted=false;
        vid.play().catch(()=>{vid.muted=true;vid.play().catch(()=>{});});
        duckAudio(true);
      }else{
        vid.muted=true;vid.pause();duckAudio(false);
      }
    });
  },{threshold:0.55});

  document.querySelectorAll('video.polaroid-media').forEach(v=>videoObserver.observe(v));

  initAudio();

  /* ── Page fade-in ── */
  const fadeEl=document.getElementById('fade-overlay');
  requestAnimationFrame(()=>{setTimeout(()=>{
    fadeEl.style.opacity='0';
    fadeEl.addEventListener('transitionend',()=>{fadeEl.style.pointerEvents='none';},{once:true});
  },50);});

  /* ── Navigation ── */
  document.addEventListener('click',()=>{
    if(!knotAnimDone)return;
    fadeEl.style.pointerEvents='auto';fadeEl.style.opacity='1';
    localStorage.setItem('hilo-audio','playing');
    setTimeout(()=>{window.location.href='page-04.html';},620);
  });
}

function buildRopePath(cx,ropeTop,pts,knotY){
  let d=`M ${cx} ${ropeTop}`;
  d+=` C ${cx} ${ropeTop+120} ${pts[0].x} ${pts[0].y-80} ${pts[0].x} ${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1];
    const sp=b.y-a.y;
    const cp1x=(a.x+cx)/2,cp1y=a.y+sp*.42;
    const cp2x=(b.x+cx)/2,cp2y=b.y-sp*.32;
    d+=` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${b.x},${b.y}`;
  }
  const last=pts[pts.length-1];
  d+=` C ${last.x} ${last.y+90} ${cx} ${knotY-70} ${cx} ${knotY}`;
  return d;
}

function triggerKnot(){
  knotAnimDone=true;
  const knotWrap=document.getElementById('knot-wrap');
  const knotLabel=document.getElementById('knot-label');
  const prompt=document.getElementById('prompt');

  knotLabel.textContent='yours.';
  knotWrap.classList.add('visible');
  knotLabel.classList.add('visible');
  prompt.textContent='click anywhere to continue';
  prompt.classList.add('visible');
}

function initAudio(){
  audioEl=document.getElementById('theme-audio');
  const btn=document.getElementById('audio-btn');
  let playing=false;
  audioEl.volume=0;
  const play=audioEl.play();
  if(play instanceof Promise){
    play.then(()=>{fadeAudio(0.6,2000);playing=true;localStorage.setItem('hilo-audio','playing');btn.textContent='♪ pause';}).catch(()=>{
      btn.textContent='♪ play';
    });
  }
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    if(playing){audioEl.pause();playing=false;localStorage.setItem('hilo-audio','paused');btn.textContent='♪ play';}
    else{audioEl.play();fadeAudio(0.6,800);playing=true;localStorage.setItem('hilo-audio','playing');btn.textContent='♪ pause';}
  });
}

let _fadeInterval=null;
function fadeAudio(targetVol,ms){
  if(!audioEl)return;
  clearInterval(_fadeInterval);
  const start=audioEl.volume;
  const steps=Math.max(1,ms/50);
  const inc=(targetVol-start)/steps;
  let step=0;
  _fadeInterval=setInterval(()=>{
    step++;audioEl.volume=clamp(start+inc*step,0,1);
    if(step>=steps){audioEl.volume=targetVol;clearInterval(_fadeInterval);if(targetVol===0)audioEl.pause();}
  },50);
}

function duckAudio(duck){
  if(!audioEl||audioDucked===duck)return;
  audioDucked=duck;
  if(duck){
    const start=audioEl.volume;clearInterval(_fadeInterval);let v=start;
    _fadeInterval=setInterval(()=>{v=lerp(v,0.18,.12);audioEl.volume=clamp(v,0,1);if(v<0.2)clearInterval(_fadeInterval);},30);
  }else{fadeAudio(0.6,600);}
}
