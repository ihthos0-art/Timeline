<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Hilo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-base: #0d0a0e;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f5ede0;
      --purple-dark: #2e1f3a;
      --purple-mid: #4a2d5c;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-base);
    }

    body {
      position: relative;
      font-family: 'Playfair Display', Georgia, serif;
      cursor: pointer;
      user-select: none;
    }

    /* ── Canvas BG ─────────────────────────────── */
    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; display: block;
    }

    /* ── Particle Canvas ──────────────────────── */
    #particle-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2; pointer-events: none;
    }

    /* ── Film Grain ────────────────────────────── */
    .grain-overlay {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0.05;
      mix-blend-mode: overlay;
      z-index: 5;
    }

    /* ── Vignette ──────────────────────────────── */
    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 6;
      opacity: 0;
      animation: vignetteIn 2s ease 0.5s forwards;
    }
    @keyframes vignetteIn {
      to { opacity: 1; }
    }

    /* ── Magnetic Glow ─────────────────────────── */
    #glow-orb {
      position: fixed;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.16) 0%, rgba(201,168,76,0.04) 40%, transparent 70%);
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 1.5s ease;
      will-change: left, top;
    }
    #glow-orb.visible { opacity: 1; }

    /* ── Scene ─────────────────────────────────── */
    #scene {
      position: fixed; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #hilo-wrap {
      position: relative;
      display: inline-block;
      padding: 48px 72px;
      perspective: 600px;
      transform-style: preserve-3d;
    }

    /* ── Title ─────────────────────────────────── */
    #hilo-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(80px, 18vw, 220px);
      font-weight: 700;
      font-style: italic;
      line-height: 1;
      letter-spacing: -0.02em;

      background: linear-gradient(
        145deg,
        var(--cream)      0%,
        var(--gold-light) 35%,
        var(--gold)       55%,
        var(--gold-light) 75%,
        var(--cream)      100%
      );
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      filter:
        drop-shadow(0 0 60px rgba(201, 168, 76, 0.22))
        drop-shadow(0 0 120px rgba(201, 168, 76, 0.08))
        drop-shadow(0 8px 32px rgba(0, 0, 0, 0.9));

      will-change: transform;

      animation: hiloFlyIn 1.5s cubic-bezier(0.22, 1, 0.36, 1) both,
                 shimmer 6s ease-in-out 2s infinite;
    }

    @keyframes hiloFlyIn {
      0%   { opacity: 0; transform: translateY(-130vh) rotateY(260deg) scale(0.45); }
      60%  { opacity: 1; }
      80%  { transform: translateY(14px) rotateY(-10deg) scale(1.03); }
      92%  { transform: translateY(-5px) rotateY(4deg) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) rotateY(0deg) scale(1); }
    }

    @keyframes shimmer {
      0%   { background-position: 200% 50%; }
      50%  { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    #hilo-title.tilt-active {
      transition: transform 0.07s linear;
    }
    #hilo-title.tilt-reset {
      transition: transform 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ── Subtitle ──────────────────────────────── */
    #subtitle {
      position: fixed;
      bottom: 8vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(12px, 1.5vw, 18px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.1em;
      white-space: nowrap;
      color: rgba(245, 237, 224, 0.5);
      opacity: 0;
      animation: subtitleFadeIn 1.5s ease 1.9s forwards;
    }

    @keyframes subtitleFadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    #subtitle.breathing {
      animation: subtitleBreathe 3.2s ease-in-out infinite;
    }
    @keyframes subtitleBreathe {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.75; }
    }

    /* ── Fade Overlay ──────────────────────────── */
    #fade-overlay {
      position: fixed; inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.6s ease;
    }
    #fade-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Reduced Motion ─────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      #hilo-title {
        animation: none !important;
        opacity: 1;
        transform: none;
        background-size: 100% 100%;
      }
      #subtitle {
        animation: none !important;
        opacity: 0.5;
      }
      .vignette { animation: none !important; opacity: 1; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>

  <svg class="grain-overlay" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
    <defs>
      <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feTurbulence id="grain-turbulence" type="fractalNoise" baseFrequency="0.68" numOctaves="4" seed="3" stitchTiles="stitch" />
        <feColorMatrix type="saturate" values="0" />
      </filter>
    </defs>
    <rect width="100%" height="100%" filter="url(#grain-filter)" />
  </svg>

  <div class="vignette"></div>
  <div id="glow-orb"></div>

  <div id="scene">
    <div id="hilo-wrap" role="presentation">
      <h1 id="hilo-title">Hilo!</h1>
    </div>
  </div>

  <p id="subtitle">Click anywhere to continue</p>
  <div id="fade-overlay" aria-hidden="true"></div>


  <script>
  /* ── Animated Background ────────────────────── */
  (function initBg() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    function draw() {
      const w = canvas.width, h = canvas.height, t = Date.now() * 0.00038;

      ctx.fillStyle = '#0d0a0e';
      ctx.fillRect(0, 0, w, h);

      const p1 = ctx.createRadialGradient(
        w*(0.18+0.14*Math.sin(t*0.9)), h*(0.22+0.12*Math.cos(t*0.7)), 0,
        w*0.18, h*0.22, w*0.72
      );
      p1.addColorStop(0, 'rgba(74,45,92,0.55)');
      p1.addColorStop(0.6, 'rgba(46,31,58,0.20)');
      p1.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = p1; ctx.fillRect(0,0,w,h);

      const p2 = ctx.createRadialGradient(
        w*(0.72+0.10*Math.cos(t*0.65)), h*(0.52+0.14*Math.sin(t*0.85)), 0,
        w*0.72, h*0.52, w*0.58
      );
      p2.addColorStop(0, 'rgba(201,168,76,0.09)');
      p2.addColorStop(0.45, 'rgba(201,168,76,0.04)');
      p2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = p2; ctx.fillRect(0,0,w,h);

      const p3 = ctx.createRadialGradient(
        w*(0.5+0.07*Math.sin(t*1.2)), h*(0.88+0.05*Math.cos(t*0.8)), 0,
        w*0.5, h*0.88, w*0.65
      );
      p3.addColorStop(0, 'rgba(46,31,58,0.60)');
      p3.addColorStop(0.5, 'rgba(26,16,24,0.30)');
      p3.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = p3; ctx.fillRect(0,0,w,h);

      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* ── Floating Particles ──────────────────────── */
  (function initParticles() {
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    const particles = [];
    const COUNT = 40;

    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < COUNT; i++) {
      particles.push({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        r: Math.random() * 1.8 + 0.3,
        dx: (Math.random() - 0.5) * 0.15,
        dy: (Math.random() - 0.5) * 0.12 - 0.08,
        alpha: Math.random() * 0.35 + 0.05,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.008 + 0.003
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        p.x += p.dx;
        p.y += p.dy;
        p.pulse += p.pulseSpeed;

        if (p.x < -10) p.x = canvas.width + 10;
        if (p.x > canvas.width + 10) p.x = -10;
        if (p.y < -10) p.y = canvas.height + 10;
        if (p.y > canvas.height + 10) p.y = -10;

        const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,168,76,${a.toFixed(3)})`;
        ctx.fill();

        if (p.r > 1.2) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(201,168,76,${(a * 0.12).toFixed(3)})`;
          ctx.fill();
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* ── Grain ────────────────────────────────────── */
  (function initGrain() {
    const turb = document.getElementById('grain-turbulence');
    let seed = 3;
    setInterval(() => { seed = (seed % 199) + 1; turb.setAttribute('seed', seed); }, 80);
  })();

  /* ── Magnetic Glow Orb ──────────────────────── */
  (function initGlow() {
    const orb = document.getElementById('glow-orb');
    let mx = innerWidth / 2, my = innerHeight / 2;
    let ox = mx, oy = my;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('touchmove', e => { mx = e.touches[0].clientX; my = e.touches[0].clientY; }, { passive: true });

    setTimeout(() => orb.classList.add('visible'), 1200);

    function tick() {
      ox += (mx - ox) * 0.06;
      oy += (my - oy) * 0.06;
      orb.style.left = ox + 'px';
      orb.style.top = oy + 'px';
      requestAnimationFrame(tick);
    }
    tick();
  })();

  /* ── Title 3D Tilt (lerp-based) ─────────────── */
  (function initTilt() {
    const title = document.getElementById('hilo-title');
    const wrap = document.getElementById('hilo-wrap');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let tiltEnabled = false, enabledOnce = false;
    let rotXCur = 0, rotYCur = 0, rotXTar = 0, rotYTar = 0;
    let lerpAmt = 0.06;

    function enableTilt() {
      if (enabledOnce) return;
      enabledOnce = true;
      title.style.animation = 'none';
      title.style.opacity = '1';
      title.style.transform = 'rotateX(0deg) rotateY(0deg)';
      tiltEnabled = true;
    }

    if (reducedMotion) {
      enableTilt();
    } else {
      title.addEventListener('animationend', function onEntry(e) {
        if (e.animationName !== 'hiloFlyIn') return;
        title.removeEventListener('animationend', onEntry);
        enableTilt();
      });
      setTimeout(enableTilt, 1600);
    }

    wrap.addEventListener('mousemove', e => {
      if (!tiltEnabled) return;
      const rect = wrap.getBoundingClientRect();
      const nx = (e.clientX - rect.left) / rect.width - 0.5;
      const ny = (e.clientY - rect.top) / rect.height - 0.5;
      rotYTar = nx * 22;
      rotXTar = -ny * 22;
      lerpAmt = 0.12;
    });

    wrap.addEventListener('mouseleave', () => {
      if (!tiltEnabled) return;
      rotXTar = 0; rotYTar = 0;
      lerpAmt = 0.04;
    });

    document.addEventListener('touchmove', e => {
      if (!tiltEnabled) return;
      const rect = wrap.getBoundingClientRect();
      const nx = (e.touches[0].clientX - rect.left) / rect.width - 0.5;
      const ny = (e.touches[0].clientY - rect.top) / rect.height - 0.5;
      rotYTar = nx * 18;
      rotXTar = -ny * 18;
      lerpAmt = 0.1;
    }, { passive: true });

    document.addEventListener('touchend', () => {
      if (!tiltEnabled) return;
      rotXTar = 0; rotYTar = 0;
      lerpAmt = 0.04;
    });

    function tiltLoop() {
      rotXCur += (rotXTar - rotXCur) * lerpAmt;
      rotYCur += (rotYTar - rotYCur) * lerpAmt;
      if (tiltEnabled) {
        title.style.transform = `rotateX(${rotXCur.toFixed(2)}deg) rotateY(${rotYCur.toFixed(2)}deg)`;
      }
      requestAnimationFrame(tiltLoop);
    }
    requestAnimationFrame(tiltLoop);
  })();

  /* ── Subtitle Breathing ──────────────────────── */
  (function initSubtitle() {
    const subtitle = document.getElementById('subtitle');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reducedMotion) { subtitle.style.opacity = '0.5'; return; }
    setTimeout(() => subtitle.classList.add('breathing'), 3400);
  })();

  /* ── Click Through ──────────────────────────── */
  (function initClickThrough() {
    const overlay = document.getElementById('fade-overlay');
    let clicked = false;
    document.addEventListener('click', () => {
      if (clicked) return;
      clicked = true;
      overlay.classList.add('active');
      setTimeout(() => { window.location.href = 'page-02.html'; }, 600);
    });
  })();
  </script>

</body>
</html>
